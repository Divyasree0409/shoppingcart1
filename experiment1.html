<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Shopping Cart</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; }
    h1 { text-align: center; }
    .products, .cart { margin-top: 2rem; }
    .item, .cart-item {
      border: 1px solid #ccc;
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    button { padding: 0.3rem 0.7rem; margin-left: 0.3rem; }
    .cart-total { text-align: right; font-weight: bold; margin-top: 0.8rem; }
    .empty { text-align: center; color: #666; }
  </style>
</head>
<body>

  <h1>Mini Shopping Cart</h1>

  <!-- product list -->
  <div class="products" id="products">
    <h2>Products</h2>
    <!-- items injected by JS -->
  </div>

  <!-- cart -->
  <div class="cart" id="cart">
    <h2>Your Cart</h2>
    <!-- cart items injected by JS -->
  </div>

  <script>
    // sample product catalog
    const PRODUCTS = [
      { id: 'p1', name: 'Notebook', price: 199 },
      { id: 'p2', name: 'Pen set', price: 99 },
      { id: 'p3', name: 'Coffee mug', price: 249 }
    ];

    const STORAGE_KEY = 'mini_cart';

    // load cart from localStorage
    function loadCart() {
      const json = localStorage.getItem(STORAGE_KEY);
      return json ? JSON.parse(json) : {};
    }

    // save cart to localStorage
    function saveCart(cart) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
    }

    // render products list
    function renderProducts() {
      const container = document.getElementById('products');
      PRODUCTS.forEach(p => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <span>${p.name} — ₹${p.price}</span>
          <button data-id="${p.id}">Add</button>
        `;
        div.querySelector('button')
           .addEventListener('click', () => addToCart(p.id));
        container.appendChild(div);
      });
    }

    // render shopping cart
    function renderCart() {
      const container = document.getElementById('cart');
      container.innerHTML = '<h2>Your Cart</h2>';
      const cart = loadCart();
      const ids = Object.keys(cart);
      if (ids.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'empty';
        empty.textContent = 'Cart is empty.';
        container.appendChild(empty);
        return;
      }

      let total = 0;

      ids.forEach(id => {
        const qty = cart[id];
        const prod = PRODUCTS.find(p => p.id === id);
        const subtotal = prod.price * qty;
        total += subtotal;

        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <span>${prod.name} x ${qty} — ₹${subtotal}</span>
          <span>
            <button class="dec" data-id="${id}">−</button>
            <button class="inc" data-id="${id}">+</button>
            <button class="rm" data-id="${id}">Remove</button>
          </span>
        `;
        div.querySelector('.inc')
           .addEventListener('click', () => changeQty(id, +1));
        div.querySelector('.dec')
           .addEventListener('click', () => changeQty(id, -1));
        div.querySelector('.rm')
           .addEventListener('click', () => removeItem(id));

        container.appendChild(div);
      });

      const totalDiv = document.createElement('div');
      totalDiv.className = 'cart-total';
      totalDiv.textContent = `Total: ₹${total}`;
      container.appendChild(totalDiv);
    }

    // add product to cart
    function addToCart(id) {
      const cart = loadCart();
      cart[id] = (cart[id] || 0) + 1;
      saveCart(cart);
      renderCart();
    }

    // change quantity
    function changeQty(id, delta) {
      const cart = loadCart();
      if (!cart[id]) return;
      cart[id] += delta;
      if (cart[id] <= 0) delete cart[id];
      saveCart(cart);
      renderCart();
    }

    // remove product entirely
    function removeItem(id) {
      const cart = loadCart();
      if (cart[id]) delete cart[id];
      saveCart(cart);
      renderCart();
    }

    // initialize
    renderProducts();
    renderCart();
  </script>

</body>
</html>
